# Starship Prompt Configuration
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Timeout for commands executed by starship (in milliseconds)
command_timeout = 500

# Change the default formatting of the prompt
format = """
[┌───────────────────────────────────────────────────>](bold green)
[│](bold green)$directory$git_branch$git_status$python$kubernetes$rust$golang$docker_context
[└─>](bold green) """

# Change the default prompt characters
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

# Shows the current directory
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " 🔒"
truncation_symbol = "…/"

# Shows Git branch
[git_branch]
symbol = "🌱 "
format = "on [$symbol$branch]($style) "
style = "bold purple"

# Shows Git status
[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "🤷"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑"

# Shows Python version
[python]
symbol = "🐍 "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow bold"
pyenv_version_name = false

# Shows Node.js version
[nodejs]
disabled = true
symbol = "⬢ "
format = "via [$symbol($version )]($style)"
style = "bold green"

# Shows Kubernetes context
[kubernetes]
symbol = "☸ "
format = 'via [$symbol$context( \($namespace\))]($style) '
style = "cyan bold"
disabled = false

# Shows Rust version
[rust]
symbol = "🦀 "
format = "via [$symbol($version )]($style)"
style = "bold red"

# Shows Go version
[golang]
symbol = "🐹 "
format = "via [$symbol($version )]($style)"
style = "bold cyan"

# Shows Docker context
[docker_context]
symbol = "🐳 "
format = "via [$symbol$context]($style) "
style = "blue bold"
only_with_files = true

# Shows command duration
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"

# Shows time
[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"
style = "bold white"
